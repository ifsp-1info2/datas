<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendário de Eventos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #F7F4EF;
      --surface:   #FFFFFF;
      --border:    #E2DDD6;
      --text:      #1C1A17;
      --muted:     #7A7269;
      --accent:    #B5600A;
      --accent-bg: #FDF0E4;
      --accent-dk: #7A3D04;
      --today-bg:  #FDF0E4;
      --event-dot: #B5600A;
      --link:      #1A5FA6;
      --danger:    #C0392B;
      --radius:    10px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      font-family: 'Lora', serif;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text);
    }
    header .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }
    .btn-header-back {
      text-decoration: none;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }
    .btn-header-back:hover { background: var(--bg); color: var(--text); }

    /* ── LAYOUT ── */
    main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 32px 20px;
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 24px;
      align-items: start;
    }
    @media (max-width: 720px) {
      main { grid-template-columns: 1fr; }
    }

    /* ── CALENDAR CARD ── */
    .cal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .cal-nav button {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 34px; height: 34px;
      font-size: 18px;
      cursor: pointer;
      color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s;
    }
    .cal-nav button:hover { background: var(--bg); color: var(--text); }
    .cal-nav .month-label {
      font-family: 'Lora', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
    }
    .cal-nav .year-label {
      font-size: 13px;
      color: var(--muted);
      margin-top: 1px;
      text-align: center;
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      padding: 10px 16px 4px;
    }
    .weekdays span {
      text-align: center;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      padding: 8px 16px 16px;
    }
    .day {
      aspect-ratio: 1;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
      position: relative;
      transition: background .12s;
      border: 1px solid transparent;
      user-select: none;
    }
    .day:hover { background: var(--bg); }
    .day.empty { cursor: default; pointer-events: none; }
    .day.today { background: var(--today-bg); color: var(--accent-dk); font-weight: 500; border-color: #E8C9A0; }
    .day.selected { background: var(--accent); color: #fff !important; border-color: var(--accent); }
    .day.selected .dot { background: rgba(255,255,255,0.7); }
    .day.has-event .day-num { margin-bottom: 2px; }
    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--event-dot);
    }

    /* ── SIDE PANEL ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      min-height: 200px;
    }
    .panel-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 200px;
      gap: 10px;
      color: var(--muted);
    }
    .panel-empty .icon { font-size: 28px; }
    .panel-empty p { font-size: 13px; text-align: center; line-height: 1.5; }

    .event-date {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }
    .event-title {
      font-family: 'Lora', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
      line-height: 1.3;
    }
    .event-time {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-bg);
      color: var(--accent-dk);
      font-size: 12px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 14px;
    }
    .event-desc {
      font-size: 14px;
      line-height: 1.75;
      color: #3E3930;
      white-space: pre-wrap;
      margin-bottom: 18px;
    }
    .downloads-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .download-link {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--link);
      font-size: 13px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 6px;
      transition: background .12s;
    }
    .download-link:hover { background: var(--bg); }
    .download-link .dl-icon { font-size: 14px; }

    .divider { height: 1px; background: var(--border); margin: 18px 0; }

    /* ── LOADING ── */
    .loading {
      display: flex; align-items: center; justify-content: center;
      height: 300px; color: var(--muted); font-size: 14px;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: var(--muted);
    }

    /* ── BACK BUTTON ── */
    .button-container {
      display: flex;
      justify-content: center;
      margin-top: 2rem;
      padding: 1.5rem 20px;
    }

    .back-button {
      background: var(--accent);
      color: #FFFFFF;
      padding: 12px 28px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: -0.01em;
      border: 1px solid var(--border);
      transition: all 0.2s ease;
      cursor: pointer;
      display: inline-block;
    }

    .back-button:hover {
      background: var(--accent-dk);
      transform: translateY(-2px);
    }

    .back-button:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Calendário Escolar</h1>
    <div class="subtitle">Clique em um dia para ver o que está programado</div>
  </div>
  <a href="index.html" class="btn-header-back">← Voltar ao Portal</a>
</header>

<main>
  <div class="cal-card">
    <div class="cal-nav">
      <button id="prev-btn" aria-label="Mês anterior">&#8249;</button>
      <div style="text-align:center">
        <div class="month-label" id="month-label">—</div>
        <div class="year-label" id="year-label">—</div>
      </div>
      <button id="next-btn" aria-label="Próximo mês">&#8250;</button>
    </div>
    <div class="weekdays">
      <span>Dom</span><span>Seg</span><span>Ter</span>
      <span>Qua</span><span>Qui</span><span>Sex</span><span>Sáb</span>
    </div>
    <div class="days" id="days-grid">
      <div class="loading">Carregando...</div>
    </div>
  </div>

  <aside class="panel" id="side-panel">
    <div class="panel-empty">
      <div class="icon">📅</div>
      <p>Selecione um dia no calendário para ver os eventos programados.</p>
    </div>
  </aside>
</main>

<script src="eventos.js"></script>
<script>
  const MONTHS = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  const WEEKDAYS_FULL = ["Domingo","Segunda-feira","Terça-feira","Quarta-feira","Quinta-feira","Sexta-feira","Sábado"];

  let events = window.eventos || {};
  let current = { year: new Date().getFullYear(), month: new Date().getMonth() };
  let selectedKey = null;
  const today = new Date();
  const todayKey = fmt(today.getFullYear(), today.getMonth(), today.getDate());

  function fmt(y, m, d) {
    return `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  }

  function loadEvents() {
    renderCalendar();
  }

  function renderCalendar() {
    const { year, month } = current;
    document.getElementById("month-label").textContent = MONTHS[month];
    document.getElementById("year-label").textContent = year;

    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const firstDay = new Date(year, month, 1).getDay();
    const grid = document.getElementById("days-grid");
    grid.innerHTML = "";

    for (let i = 0; i < firstDay; i++) {
      const el = document.createElement("div");
      el.className = "day empty";
      grid.appendChild(el);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const key = fmt(year, month, d);
      const hasEvent = !!events[key] && events[key].length > 0;
      const isToday = key === todayKey;
      const isSelected = key === selectedKey;

      const el = document.createElement("div");
      el.className = "day" + (hasEvent ? " has-event" : "") + (isToday ? " today" : "") + (isSelected ? " selected" : "");
      el.setAttribute("aria-label", `${d} de ${MONTHS[month]}`);

      const num = document.createElement("span");
      num.className = "day-num";
      num.textContent = d;
      el.appendChild(num);

      if (hasEvent) {
        const dot = document.createElement("div");
        dot.className = "dot";
        el.appendChild(dot);
      }

      el.addEventListener("click", () => selectDay(key, d));
      grid.appendChild(el);
    }
  }

  function selectDay(key, day) {
    selectedKey = key;
    renderCalendar();
    renderPanel(key, day);
  }

  function renderPanel(key, day) {
    const panel = document.getElementById("side-panel");
    const dayEvents = events[key];
    const { year, month } = current;
    const weekday = WEEKDAYS_FULL[new Date(year, month, day).getDay()];

    if (!dayEvents || dayEvents.length === 0) {
      panel.innerHTML = `
        <div class="panel-empty">
          <div class="icon">🗓️</div>
          <p>Nenhum evento programado para este dia.</p>
        </div>`;
      return;
    }

    let html = `<div class="event-date">${weekday}, ${day} de ${MONTHS[month]} de ${year}</div>`;

    dayEvents.forEach((ev, idx) => {
      if (idx > 0) html += `<div class="divider"></div>`;
      
      html += `<div class="event-title">${esc(ev.title)}</div>`;

      if (ev.time) {
        html += `<div class="event-time">🕐 ${esc(ev.time)}</div>`;
      }

      if (ev.description) {
        html += `<div class="event-desc">${esc(ev.description)}</div>`;
      }

      if (ev.downloads && ev.downloads.length > 0) {
        html += `<div class="downloads-label">Downloads & Links</div>`;
        ev.downloads.forEach(dl => {
          html += `<a href="${esc(dl.url)}" target="_blank" rel="noopener" class="download-link">
            <span class="dl-icon">↓</span> ${esc(dl.label)}
          </a>`;
        });
      }
    });

    panel.innerHTML = html;
  }

  function esc(str) {
    return String(str ?? "")
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  document.getElementById("prev-btn").addEventListener("click", () => {
    if (current.month === 0) { current.year--; current.month = 11; }
    else current.month--;
    selectedKey = null;
    renderCalendar();
    document.getElementById("side-panel").innerHTML = `
      <div class="panel-empty"><div class="icon">📅</div>
      <p>Selecione um dia para ver os eventos.</p></div>`;
  });

  document.getElementById("next-btn").addEventListener("click", () => {
    if (current.month === 11) { current.year++; current.month = 0; }
    else current.month++;
    selectedKey = null;
    renderCalendar();
    document.getElementById("side-panel").innerHTML = `
      <div class="panel-empty"><div class="icon">📅</div>
      <p>Selecione um dia para ver os eventos.</p></div>`;
  });

  loadEvents();
</script>

</body>
</html>
