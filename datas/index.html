<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Início</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FBF8F3;
            --surface: #FFFFFF;
            --surface-alt: #F9F5EE;
            --border: #E8DCCB;
            --header-bg: #C8A87A;
            --accent: #C8A87A;
            --accent-dark: #9A7550;
            --time-bg: #F0E6CC;
            --time-text: #7A5C2E;
            --cell-text: #4A3728;
            --muted: #B8A898;
            --radius: 16px;
            --shadow: 0 4px 24px rgba(120, 80, 30, 0.10), 0 1px 4px rgba(120, 80, 30, 0.06);
            --shadow-hover: 0 8px 32px rgba(120, 80, 30, 0.16), 0 2px 8px rgba(120, 80, 30, 0.10);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 1.5rem;
        }

        /* ── Logo / topo ── */
        .logo-area {
            text-align: center;
            margin-bottom: 3rem;
        }

        .logo-icon {
            width: 52px;
            height: 52px;
            background: var(--accent);
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
            box-shadow: 0 4px 16px rgba(200, 168, 122, 0.35);
        }

        .logo-icon svg {
            width: 26px;
            height: 26px;
            fill: none;
            stroke: #fff;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .logo-title {
            font-size: 26px;
            font-weight: 600;
            color: var(--cell-text);
            letter-spacing: -0.03em;
            margin-bottom: 6px;
        }

        .logo-subtitle {
            font-size: 14px;
            color: var(--muted);
            font-weight: 400;
        }

        /* ── Grid de cards ── */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 580px;
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            text-decoration: none;
            color: inherit;
            padding: 28px 24px 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--accent);
            opacity: 0;
            transition: opacity 0.18s ease;
            border-radius: var(--radius) var(--radius) 0 0;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
            border-color: #D4B896;
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-icon {
            width: 44px;
            height: 44px;
            background: var(--time-bg);
            border-radius: 11px;
            border: 1px solid #E2CBA0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .card-icon svg {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: var(--accent-dark);
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .card-body {
            flex: 1;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--cell-text);
            margin-bottom: 6px;
            letter-spacing: -0.02em;
        }

        .card-desc {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.55;
        }

        .card-footer {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            color: var(--accent-dark);
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .card-footer svg {
            width: 14px;
            height: 14px;
            fill: none;
            stroke: var(--accent-dark);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: transform 0.15s ease;
        }

        .card:hover .card-footer svg {
            transform: translateX(3px);
        }

        /* ── Modal de Seleção ── */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(74, 55, 40, 0.4);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        
        .modal-card {
            background: var(--surface);
            border-radius: var(--radius);
            width: 100%;
            max-width: 400px;
            padding: 32px;
            box-shadow: var(--shadow-hover);
            text-align: center;
        }
        .modal-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--cell-text);
            margin-bottom: 24px;
        }
        .modal-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .modal-btn {
            background: var(--surface-alt);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--cell-text);
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .modal-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
        .modal-close { margin-top: 20px; font-size: 13px; color: var(--muted); cursor: pointer; background: none; border: none; }

        /* ── Rodapé ── */
        .footer {
            margin-top: 3rem;
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 0.02em;
        }

        /* ── Responsivo ── */
        @media (max-width: 640px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="logo-area">
        <div class="logo-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        </div>
        <h1 class="logo-title"> Portal | 1INFO-2</h1>
        <p class="logo-subtitle">Selecione uma área para continuar</p>
    </div>

    <div class="grid">

        <!-- Card 1 -->
        <a href="aulas.html" class="card">
            <div class="card-icon">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                    <line x1="16" y1="2" x2="16" y2="6"/>
                    <line x1="8" y1="2" x2="8" y2="6"/>
                    <line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
            </div>
            <div class="card-body">
                <p class="card-title">Horários de Aulas</p>
                <p class="card-desc">Visualize a grade de aulas da semana.</p>
            </div>
            <div class="card-footer">
                Acessar
                <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </div>
        </a>

        <!-- Card 2 -->
        <div class="card" onclick="openCalendarModal()">
            <div class="card-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M19 4H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z"/>
                    <path d="M16 2v4M8 2v4M3 10h18"/>
                </svg>
            </div>
            <div class="card-body">
                <p class="card-title">Calendário</p>
                <p class="card-desc">Acesse datas de provas, atividades e eventos.</p>
            </div>
            <div class="card-footer">
                Escolher exibição
                <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </div>
        </div>
    </div>

  

    <!-- Modal -->
    <div class="modal-overlay" id="calendarModal">
        <div class="modal-card">
            <h2 class="modal-title">Selecione como deseja visualizar.</h2>
            <div class="modal-options">
                <a href="mes.html" class="modal-btn">Visualização por Mês</a>
                <a href="data.html" class="modal-btn">Visualização por Data (Lista)</a>
            </div>
            <button class="modal-close" onclick="closeCalendarModal()">Cancelar</button>
        </div>
    </div>

    <script>
        function openCalendarModal() { document.getElementById('calendarModal').classList.add('active'); }
        function closeCalendarModal() { document.getElementById('calendarModal').classList.remove('active'); }
        window.onclick = function(event) {
            let modal = document.getElementById('calendarModal');
            if (event.target == modal) closeCalendarModal();
        }
    </script>

</body>
</html>
